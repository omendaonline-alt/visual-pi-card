<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification - Omenda Pi Pays Global</title>
  <link rel="icon" type="image/svg+xml" href="icon-192.svg">
  <style>
    body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f8fafc;color:#111827}
    main{max-width:460px;margin:20px;padding:24px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 14px 40px rgba(15,23,42,.08);text-align:center}
    a,button{display:inline-flex;align-items:center;justify-content:center;margin-top:14px;padding:11px 16px;border-radius:8px;background:#c0392b;color:#fff;text-decoration:none;border:0;font-weight:800;cursor:pointer}
    p{color:#64748b;line-height:1.5}
  </style>
</head>
<body>
  <main>
    <h1>Verification Complete</h1>
    <p>Your local seller verification is ready. Continue to the product posting flow.</p>
    <a id="continueLink" href="post%20product.html">Continue</a>
  </main>
  <script>
    var params=new URLSearchParams(location.search);
    var redirect=params.get('redirect')||'post product.html';
    if(!/^[\w .%-]+\.html$/i.test(redirect))redirect='post product.html';
    try{localStorage.setItem('kyc_completed','true')}catch(e){}
    document.getElementById('continueLink').href=redirect;
  </script>
</body>
</html>
