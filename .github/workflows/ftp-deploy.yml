name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - omendaonline-alt

jobs:
  ssh-deploy:
    name: Deploy to omendapipaysglobel.online
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          rsync -av \
            --exclude '.git*' \
            --exclude '.github*' \
            --exclude 'node_modules*' \
            --exclude 'package-lock.json' \
            --exclude '.vscode*' \
            --exclude 'README.md' \
            --exclude 'deploy.ps1' \
            --exclude 'git-deploy.ps1' \
            --exclude '.env*' \
            --exclude 'Pi network visual card/**' \
            ./ deploy/

      - name: Deploy site via SSH
        uses: appleboy/scp-action@v1
        with:
          host: omendapipaysglobel.online
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: deploy
          target: public_html/
          strip_components: 1
          overwrite: true
