var catColors = {
  shop:      { bg:"#f97316", border:"#ea580c" },
  seller:    { bg:"#8b5cf6", border:"#7c3aed" },
  hotel:     { bg:"#06b6d4", border:"#0891b2" },
  restaurant:{ bg:"#ef4444", border:"#dc2626" },
  property:  { bg:"#10b981", border:"#059669" },
  transport: { bg:"#3b82f6", border:"#2563eb" },
  service:   { bg:"#f59e0b", border:"#d97706" }
};

var catEmoji = { shop:"\ud83d\udecd\ufe0f", seller:"\ud83d\udc64", hotel:"\ud83c\udfe8", restaurant:"\ud83c\udf7d\ufe0f", property:"\ud83c\udfe0", transport:"\ud83d\ude97", service:"\ud83d\udd27" };

// ── Initialize Map ──
var map, osmStreets, esriSat, esriLabels, esriRoads, googleHybrid, googleStreets;
try {

// Check Leaflet loaded
if (typeof L === 'undefined') {
  throw new Error('Map library failed to load. Please check your internet connection and reload.');
}
map = L.map('map',{ zoomControl:false }).setView([20, 0], 2);

L.control.zoom({ position:'bottomright' }).addTo(map);

// OpenStreetMap (reliable default)
osmStreets = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19,
  crossOrigin:true
});

// Esri Satellite
esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution:'Tiles &copy; Esri &mdash; Maxar, Earthstar Geographics',
  maxZoom:20
});

// Esri labels overlay
esriLabels = L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:20, pane:'overlayPane'
});
esriRoads = L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:20, pane:'overlayPane'
});

// Google Satellite Hybrid
googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution:'Map data &copy; Google',
  maxZoom:21
});

// Google Street Map
googleStreets = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
  attribution:'Map data &copy; Google',
  maxZoom:21
});

// Default: OpenStreetMap
osmStreets.addTo(map);

// Monitor tile loading errors - auto-switch to Google Streets if OSM fails
var osmFails = 0;
osmStreets.on('tileerror', function() {
  osmFails++;
  if (osmFails > 3 && map.hasLayer(osmStreets)) {
    map.removeLayer(osmStreets);
    googleStreets.addTo(map);
  }
});

// Layer switcher control
var baseLayers = {
  '\ud83d\uddfa\ufe0f Street Map': osmStreets,
  '\ud83d\udef0\ufe0f Satellite (Esri)': esriSat,
  '\ud83d\udef0\ufe0f Satellite (Google)': googleHybrid,
  '\ud83d\uddfa\ufe0f Google Streets': googleStreets
};
var overlays = {
  '\ud83c\udff7\ufe0f Street Names': esriRoads,
  '\ud83c\udff7\ufe0f Place Names': esriLabels
};
L.control.layers(baseLayers, overlays, { position:'topright', collapsed:true }).addTo(map);

// Auto-manage overlays when switching base layers
map.on('baselayerchange', function(e) {
  if (e.name === '\ud83d\udef0\ufe0f Satellite (Esri)') {
    if (!map.hasLayer(esriLabels)) esriLabels.addTo(map);
    if (!map.hasLayer(esriRoads)) esriRoads.addTo(map);
  }
});

// Auto-locate user on load and show real live location
var myLocMarker = null;
var myLocCircle = null;
var watchId = null;

if (navigator.geolocation) {
  watchId = navigator.geolocation.watchPosition(function(pos) {
    var lat = pos.coords.latitude;
    var lng = pos.coords.longitude;
    var acc = pos.coords.accuracy;
    if (!myLocMarker) {
      map.setView([lat, lng], 17);
      myLocCircle = L.circle([lat, lng], { radius:acc, color:'#3b82f6', fillColor:'#3b82f6', fillOpacity:0.1, weight:1.5 }).addTo(map);
      myLocMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className:'',
          html:'<div style="width:22px;height:22px;border-radius:50%;background:#3b82f6;border:4px solid #fff;box-shadow:0 0 0 8px rgba(59,130,246,.2),0 2px 8px rgba(59,130,246,.5);animation:livePulse 1.5s infinite"></div>',
          iconSize:[22,22], iconAnchor:[11,11]
        })
      }).addTo(map).bindPopup('<b>\ud83d\udccd My Live Location</b><br><small>Lat: '+lat.toFixed(5)+', Lng: '+lng.toFixed(5)+'</small>');
    } else {
      myLocMarker.setLatLng([lat, lng]);
      myLocMarker.setPopupContent('<b>\ud83d\udccd My Live Location</b><br><small>Lat: '+lat.toFixed(5)+', Lng: '+lng.toFixed(5)+'</small>');
      myLocCircle.setLatLng([lat, lng]);
      myLocCircle.setRadius(acc);
    }
  }, function(){}, { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
}

// ── Create markers ──
var markers = [];
var activeCategory = 'all';

function createMarkerIcon(category) {
  var c = catColors[category] || { bg:"#6b7280", border:"#4b5563" };
  var emoji = catEmoji[category] || "\ud83d\udccd";
  return L.divIcon({
    className:'',
    html:'<div style="width:36px;height:36px;border-radius:50%;background:'+c.bg+';border:3px solid '+c.border+';display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.25);cursor:pointer">'+emoji+'</div>',
    iconSize:[36,36],
    iconAnchor:[18,18],
    popupAnchor:[0,-20]
  });
}

function buildPopup(b) {
  var badgeHtml = b.badge ? '<span class="popup-badge" style="background:'+(b.badgeColor||'#f0fdf4')+';color:'+(b.badgeText||'#16a34a')+'">'+b.badge+'</span>' : '';
  return '<div class="popup-card">' +
    '<img class="popup-img" src="'+b.image+'" alt="'+b.name+'" onerror="this.style.background=\'#f4f4f5\';this.alt=\'Image\'">' +
    '<div class="popup-body">' +
      '<div class="popup-cat">'+catEmoji[b.category]+' '+b.category.toUpperCase()+'</div>' +
      '<div class="popup-name">'+b.name+'</div>' +
      '<div class="popup-addr">\ud83d\udccd '+b.address+'</div>' +
      '<div class="popup-row">' +
        '<span class="popup-rating">\u2b50 '+b.rating+'</span>' +
        '<span class="popup-price">'+b.price+'</span>' +
        badgeHtml +
      '</div>' +
      '<p style="font-size:.7rem;color:#71717a;margin-top:6px;line-height:1.4">'+b.desc+'</p>' +
      '<div class="popup-actions">' +
        '<button class="btn-view" onclick="window.location.href=\'shop.html\'">View Products</button>' +
        '<button class="btn-dir" onclick="openDirections('+b.lat+','+b.lng+')">Directions</button>' +
      '</div>' +
    '</div></div>';
}

function addMarkers(list) {
  markers.forEach(function(m){ map.removeLayer(m); });
  markers = [];

  list.forEach(function(b) {
    var marker = L.marker([b.lat, b.lng], { icon: createMarkerIcon(b.category) })
      .bindPopup(buildPopup(b), { maxWidth:280, minWidth:220 });
    marker.bizData = b;
    marker.addTo(map);
    markers.push(marker);
  });

  document.getElementById('bizCount').textContent = list.length;
  buildList(list);
}

// ── Load user-registered businesses from KYC ──
(function(){
  try{
    var raw=localStorage.getItem("kyc_data");
    if(!raw)return;
    var d=JSON.parse(raw);
    if(!d.isBusiness||!d.bizLat||!d.bizLng)return;
    var userBiz={
      id:"user_"+Date.now(),
      name:d.bizName||"My Business",
      category:"shop",
      icon:"\ud83c\udfe2",
      lat:parseFloat(d.bizLat),
      lng:parseFloat(d.bizLng),
      address:d.bizAddress||d.city+", "+d.country,
      rating:5.0,
      price:"\u03C00.001",
      image:"https://images.unsplash.com/photo-1556740738-b6a63e27c4df?w=400&auto=format&fit=crop",
      badge:"Your Business",
      badgeColor:"#fef3c7",
      badgeText:"#d97706",
      desc:(d.bizType?d.bizType.replace(/_/g," ")+". ":"")+"Registered by "+d.firstName+" "+d.lastName+"."
    };
    businesses.push(userBiz);
  }catch(e){}
})();

// Initial load
addMarkers(businesses);
applyMapQueryParams();

// Force map to recalculate size after DOM settles
setTimeout(function(){ if(map) map.invalidateSize(); }, 300);
setTimeout(function(){ if(map) map.invalidateSize(); }, 1000);
setTimeout(function(){ if(map) map.invalidateSize(); }, 3000);

function getUrlParams() {
  var params = {};
  var query = window.location.search.substring(1);
  if (!query) return params;
  query.split('&').forEach(function(part) {
    var pair = part.split('=');
    if (!pair[0]) return;
    params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
  });
  return params;
}

function applyMapQueryParams() {
  var params = getUrlParams();
  var route = [];
  if (params.pickup) route.push('Pickup: ' + params.pickup);
  if (params.dropoff) route.push('Dropoff: ' + params.dropoff);
  if (route.length) {
    var info = document.getElementById('routeInfo');
    info.innerHTML = '<strong>Ride route from City Rush</strong><span>' + route.join('<br>') + '</span>';
    info.style.display = 'block';
  }
  if (params.search) {
    document.getElementById('mapSearch').value = params.search;
    searchBusiness();
  }
  if (params.category) {
    var button = document.querySelector('.cat-filter button[data-cat="' + params.category + '"]');
    if (button) filterCategory(params.category, button);
  }
}

// ── Category Filter ──
function filterCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-filter button').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');

  var filtered = cat === 'all' ? businesses : businesses.filter(function(b){ return b.category === cat; });
  addMarkers(filtered);

  if (filtered.length > 0) {
    var group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.1));
  }
}

// ── Search ──
function searchBusiness() {
  var q = document.getElementById('mapSearch').value.toLowerCase().trim();
  if (!q) {
    var filtered = activeCategory === 'all' ? businesses : businesses.filter(function(b){ return b.category === activeCategory; });
    addMarkers(filtered);
    return;
  }

  var results = businesses.filter(function(b) {
    return b.name.toLowerCase().indexOf(q) !== -1 ||
           b.address.toLowerCase().indexOf(q) !== -1 ||
           b.category.toLowerCase().indexOf(q) !== -1 ||
           b.desc.toLowerCase().indexOf(q) !== -1;
  });

  addMarkers(results);
  if (results.length > 0) {
    var group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.1));
  }
}

document.getElementById('mapSearch').addEventListener('keyup', function(e) {
  if (e.key === 'Enter') searchBusiness();
});

// ── Locate Me ──
function locateMe() {
  if (!navigator.geolocation) { alert('Geolocation not supported by your browser.'); return; }
  if (myLocMarker) {
    map.setView(myLocMarker.getLatLng(), 17);
    myLocMarker.openPopup();
  } else {
    navigator.geolocation.getCurrentPosition(function(pos) {
      map.setView([pos.coords.latitude, pos.coords.longitude], 17);
    }, function() {
      alert('Unable to get your location. Please enable location permissions.');
    }, { enableHighAccuracy:true });
  }
}

// ── Directions ──
function openDirections(lat, lng) {
  window.open('https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng, '_blank', 'noopener,noreferrer');
}

// ── List View ──
function toggleList() {
  document.getElementById('listPanel').classList.toggle('open');
}

function buildList(list) {
  var html = '';
  list.forEach(function(b) {
    var badgeHtml = b.badge ? '<span class="biz-badge" style="background:'+(b.badgeColor||'#f0fdf4')+';color:'+(b.badgeText||'#16a34a')+'">'+b.badge+'</span>' : '';
    html += '<div class="biz-card" onclick="focusBusiness(\''+b.id+'\')">' +
      '<div class="biz-img"><img src="'+b.image+'" alt="'+b.name+'" loading="lazy" onerror="this.style.background=\'#e4e4e7\'"></div>' +
      '<div class="biz-info">' +
        '<div class="biz-name">'+b.name+'</div>' +
        '<div class="biz-cat">'+catEmoji[b.category]+' '+b.category.charAt(0).toUpperCase()+b.category.slice(1)+'</div>' +
        '<div class="biz-addr">\ud83d\udccd '+b.address+'</div>' +
        '<div class="biz-meta">' +
          '<span class="biz-rating">\u2b50 '+b.rating+'</span>' +
          '<span class="biz-price">'+b.price+'</span>' +
          badgeHtml +
        '</div>' +
      '</div></div>';
  });
  document.getElementById('bizList').innerHTML = html;
}

function focusBusiness(id) {
  document.getElementById('listPanel').classList.remove('open');
  for (var i=0; i<markers.length; i++) {
    if (markers[i].bizData && markers[i].bizData.id === id) {
      var b = markers[i].bizData;
      map.setView([b.lat, b.lng], 15);
      markers[i].openPopup();
      break;
    }
  }
}

} catch(e) {
  var errDiv = document.getElementById('map');
  if(errDiv) errDiv.innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444"><b>⚠️ Map failed to load</b><br><br>'+e.message+'<br><br><button onclick="location.reload()" style="padding:8px 20px;border-radius:8px;background:#f97316;color:#fff;border:none;font-weight:700;cursor:pointer">Reload Page</button></div>';
}
</script>
