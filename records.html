<!-- ── FILTER BAR ── -->
<div class="filter-bar" id="filterBar">

  <button data-filter="sent" onclick="setFilter('sent',this)">&#11014; Sent</button>
  <button data-filter="shop" onclick="setFilter('shop',this)">&#9733; Purchases</button>
</div>

<!-- ── SEARCH ── -->
<div class="search-bar">
  <div class="search-input">

</div>

  <label>From</label>
  <input type="date" id="dateFrom" onchange="applyFilters()">
  <label>To</label>
  <input type="date" id="dateTo" onchange="applyFilters()">
</div>

<!-- ── TRANSACTIONS ── -->
<div class="tx-section" id="txSection"></div>

<!-- ── DETAIL MODAL ── -->
<div class="tx-modal-overlay" id="txModal" onclick="if(event.target===this)closeTxModal()">

<script>
var STORAGE_KEY = 'pivisualcard_data';
var USER_KEY = 'pivisualcard_user';
var allTransactions = [];
var currentFilter = 'all';

// ── Load transactions from localStorage (same store as index.html) ──
function loadTransactions() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      var data = JSON.parse(saved);
      if (Array.isArray(data.transactions)) allTransactions = data.transactions;
    }
  } catch(e) {}

  // Also load card-specific transactions from card pages
  var cardKeys = ['black_transactions','gold_transactions','plat_transactions'];
  cardKeys.forEach(function(key) {
    try {
      var raw = localStorage.getItem(key);
      if (raw) {
        var arr = JSON.parse(raw);
        if (Array.isArray(arr)) {
          arr.forEach(function(tx) {
            // Tag with source if not already
            if (!tx._src) tx._src = key.replace('_transactions','');
            allTransactions.push(tx);
          });
        }
      }
    } catch(e) {}
  });

  // Sort all by date descending
  allTransactions.sort(function(a, b) {
    return new Date(b.date) - new Date(a.date);
  });
}

// ── Get user info ──
function getUserInfo() {
  try {
    var raw = localStorage.getItem(USER_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

// ── Compute summary ──
function updateSummary(list) {
  var income = 0, expense = 0;
  list.forEach(function(tx) {
    if (tx.amount > 0) income += tx.amount;
    else expense += Math.abs(tx.amount);
  });
  document.getElementById('totalIncome').textContent = '+' + income.toFixed(2) + ' \u03C0';
  document.getElementById('totalSpent').textContent = '-' + expense.toFixed(2) + ' \u03C0';
  var net = income - expense;
  document.getElementById('netBalance').textContent = (net >= 0 ? '+' : '') + net.toFixed(2) + ' \u03C0';
}

// ── Sanitize ──
function sanitize(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Filter ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  var query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var from = document.getElementById('dateFrom').value;
  var to = document.getElementById('dateTo').value;

  var filtered = allTransactions.filter(function(tx) {
    // Type filter
    if (currentFilter !== 'all' && tx.type !== currentFilter) return false;
    // Search
    if (query) {
      var haystack = ((tx.name || '') + ' ' + (tx.txid || '') + ' ' + tx.amount).toLowerCase();
      if (haystack.indexOf(query) === -1) return false;
    }
    // Date range
    if (from || to) {
      var txDate = tx.date ? tx.date.substring(0, 10) : '';
      if (from && txDate < from) return false;
      if (to && txDate > to) return false;
    }
    return true;
  });

  updateSummary(filtered);
  renderTransactions(filtered);
}

// ── Render grouped by date ──
function renderTransactions(list) {
  var section = document.getElementById('txSection');

  if (!list || list.length === 0) {
    section.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-text">No transactions found</div><div class="empty-sub">Your Pi transactions will appear here</div></div>';
    return;
  }

  // Group by date
  var groups = {};
  list.forEach(function(tx) {
    var d = tx.date ? new Date(tx.date) : new Date();
    var key = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(tx);
  });

  var html = '';
  Object.keys(groups).forEach(function(dateKey) {
    html += '<div class="tx-date-group">';
    html += '<div class="tx-date-header">' + dateKey + '</div>';

    groups[dateKey].forEach(function(tx, idx) {
      var isPositive = tx.amount > 0;
      var iconClass = tx.type === 'sent' ? 'sent' : tx.type === 'shop' ? 'shop' : 'recv';
      var iconChar = tx.type === 'sent' ? '\u25B2' : tx.type === 'recv' ? '\u25BC' : '\u2605';
      var badgeClass = tx.type === 'sent' ? 'badge-sent' : tx.type === 'recv' ? 'badge-recv' : 'badge-shop';
      var typeLabel = tx.type === 'sent' ? 'Sent' : tx.type === 'recv' ? 'Received' : 'Purchase';
      var timeStr = tx.date ? new Date(tx.date).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '';
      var txidStr = tx.txid ? '<div class="tx-txid">TxID: ' + sanitize(tx.txid.substring(0, 20)) + '...</div>' : '';
      var cardBadge = '';
      if (tx.cardType || tx._src) {
        var ct = tx.cardType || tx._src || '';
        cardBadge = ' <span class="card-badge card-' + sanitize(ct) + '">' + sanitize(ct.toUpperCase()) + '</span>';
      }

      html += '<div class="tx-card" onclick=\'openTxDetail(' + JSON.stringify(JSON.stringify(tx)) + ')\'>';
      html += '<div class="tx-icon ' + iconClass + '">' + iconChar + '</div>';
      html += '<div class="tx-info">';
      html += '<div class="tx-name">' + sanitize(tx.name || 'Transaction') + '</div>';
      html += '<div class="tx-meta"><span class="tx-time">' + timeStr + '</span><span class="tx-type-badge ' + badgeClass + '">' + typeLabel + '</span>' + cardBadge + '</div>';
      html += txidStr;
      html += '</div>';
      html += '<div class="tx-amount ' + (isPositive ? 'positive' : 'negative') + '">' + (isPositive ? '+' : '') + tx.amount.toFixed(2) + ' \u03C0</div>';
      html += '</div>';
    });

    html += '</div>';
  });

  section.innerHTML = html;
}

// ── Detail Modal ──
function openTxDetail(txJson) {
  var tx = JSON.parse(txJson);
  var isPositive = tx.amount > 0;
  var amountClass = isPositive ? 'positive' : 'negative';
  var typeLabel = tx.type === 'sent' ? '\u25B2 Sent' : tx.type === 'recv' ? '\u25BC Received' : '\u2605 Purchase';
  var dateStr = tx.date ? new Date(tx.date).toLocaleString('en-US', {
    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  }) : 'N/A';

  var html = '<div class="detail-amount ' + amountClass + '">' + (isPositive ? '+' : '') + tx.amount.toFixed(4) + ' \u03C0</div>';
  html += '<div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">' + typeLabel + '</span></div>';
  html += '<div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">' + sanitize(tx.name || 'N/A') + '</span></div>';
  html += '<div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">' + dateStr + '</span></div>';
  if (tx.txid) {
    html += '<div class="detail-row"><span class="detail-label">TxID</span><span class="detail-value inline-style-2" >' + sanitize(tx.txid) + '</span></div>';
  }
  if (tx.cardType || tx._src) {
    html += '<div class="detail-row"><span class="detail-label">Card</span><span class="detail-value">' + sanitize((tx.cardType || tx._src || '').toUpperCase()) + '</span></div>';
  }
  if (tx.status) {
    html += '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value inline-style-3" >' + sanitize(tx.status) + '</span></div>';
  }

  document.getElementById('txModalContent').innerHTML = html;
  document.getElementById('txModal').classList.add('open');
}

function closeTxModal() {
  document.getElementById('txModal').classList.remove('open');
}

// ── Export CSV ──
function exportCSV() {
  if (allTransactions.length === 0) { alert('No transactions to export.'); return; }

  var rows = [['Date','Time','Type','Name','Amount (Pi)','TxID','Card']];
  allTransactions.forEach(function(tx) {
    var d = tx.date ? new Date(tx.date) : new Date();
    rows.push([
      d.toLocaleDateString('en-CA'),
      d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
      tx.type || '',
      '"' + (tx.name || '').replace(/"/g, '""') + '"',
      tx.amount.toFixed(4),
      tx.txid || '',
      tx.cardType || tx._src || ''
    ]);
  });

  var csv = rows.map(function(r) { return r.join(','); }).join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'pi-transactions-' + new Date().toISOString().substring(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Keyboard shortcut ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeTxModal();
});

// ── Init ──
loadTransactions();
updateSummary(allTransactions);
renderTransactions(allTransactions);
</script>
